# baseline_v4（单配置）
# 目标：保留预训练初始化，并硬冻结 backbone，仅训练 ASPP 头
base_config: "configs/baseline_v3/train_vit_seg_baseline_v3_base.yaml"

experiment:
  run_name: "baseline_v4_freeze_seed42"
  seed: 42

model:
  pretrained: true
  decoder_head: "aspp_head"
  # 硬冻结主干：requires_grad=False
  freeze_backbone: true

optimizer:
  # 仅显式保留解码头学习率倍率
  decoder_lr_mult: 1.0

output:
  run_subdir: "baseline_v4_freeze_seed42"
