imagery_11block: "data/interim/imagery_1m_aligned/tdop_11block_1m_aligned.tif"
label_11block: "data/interim/labels_1m_aligned/lumid_11block_1m_aligned_v2_strict7.tif"
output_dir: "data/processed/vit_dataset/v2_11block7_inference_full/manifests"

patch_size: 512
train_stride: 128
eval_stride: 128
buffer_m: 0.0

label_nodata: 255
