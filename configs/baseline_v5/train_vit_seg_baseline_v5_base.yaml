# =========================
# baseline_v5 基础配置（formal 训练）
# 说明：
# 1) 严格 7 类数据集：v2_11block7；
# 2) 策略：冻结 backbone + 解冻最后 N 个 block（部分解冻）；
# 3) 使用 ViT-Large DINOv3 遥感预训练主干。
# =========================

experiment:
  run_name: "baseline_v5_partial_unfreeze_v2_strict7_seed42"
  seed: 42
  deterministic: true
  cudnn_benchmark: false

data:
  dataset_root: "data/processed/vit_dataset/v2_11block7"
  manifest_path: "data/processed/vit_dataset/v2_11block7/manifests/tiles_manifest_balanced_train.csv"
  image_dirname: "images"
  label_dirname: "labels"
  image_suffix: ".tif"
  label_suffix: ".tif"
  patch_size: 512
  in_channels: 3
  num_classes: 7
  # strict7：标签值即类别 id
  class_lum_ids: [1, 2, 3, 4, 5, 6, 7]
  ignore_index: 255
  # strict7 已完成重映射，这里不再额外忽略任何 lum_id
  ignore_lum_ids: []
  validate_files_on_start: true
  augmentation:
    enabled: true
    hflip_prob: 0.5
    vflip_prob: 0.5
    rot90_prob: 0.5
    color_jitter_prob: 0.3
    brightness_delta: 0.1
    contrast_delta: 0.1
    channel_scale_prob: 0.2
    channel_scale_delta: 0.08
    gaussian_noise_prob: 0.2
    gaussian_noise_std: 0.02

loader:
  batch_size: 1
  eval_batch_size: 1
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  drop_last_train: false
  prefetch_factor: 2

model:
  architecture: "timm_seg"
  backbone: "vit_large_patch16_dinov3.sat493m"
  pretrained: true
  # 预训练权重来源说明（文档字段，脚本不消费）
  pretrained_provider: "timm"
  pretrained_repo_id: "timm/vit_large_patch16_dinov3.sat493m"
  pretrained_host: "Hugging Face Hub"
  pretrained_file_preference: "model.safetensors"
  dropout: 0.2
  decoder_head: "aspp_head"
  drop_path_rate: 0.1
  # 部分解冻策略：先冻结，再解冻最后 N 个 block
  freeze_backbone: true
  unfreeze_backbone_last_n_blocks: 2
  # 同时解冻 backbone 末端归一化层，提升域适配能力
  unfreeze_backbone_norm: true

train:
  max_epochs: 30
  amp: true
  grad_clip_norm: 1.0
  grad_accum_steps: 2
  log_every_n_steps: 20
  val_every_n_epochs: 1
  early_stopping_patience: 8
  early_stopping_min_delta: 0.0005

optimizer:
  lr: 4.0e-5
  weight_decay: 1.0e-2
  betas: [0.9, 0.999]
  eps: 1.0e-8
  backbone_lr_mult: 0.2
  decoder_lr_mult: 1.0

scheduler:
  warmup_epochs: 5
  power: 0.9
  min_lr: 5.0e-7

loss:
  type: "ce_dice"
  ignore_index: 255
  label_smoothing: 0.0
  ce_weight: 1.0
  dice_weight: 1.0
  class_weights: "auto_sqrt_inverse_freq"
  class_weights_floor: 0.2
  class_weights_cap: 5.0
  class_weights_renorm_after_clip: false

output:
  root_dir: "outputs/train_runs/formal"
  run_subdir: "baseline_v5_partial_unfreeze_v2_strict7_seed42"
  save_best_by: "val_miou"

evaluation:
  splits_to_eval: ["val", "test"]
  eco_holdout_missing_class_policy: "mark_na_and_average_present_classes"

freeze:
  verify_fingerprint_on_start: false
