# =========================
# deit3_v1 基础配置（预留）
# 说明：
# 1) 目录结构对齐 baseline_v1，便于后续多 seed 对照；
# 2) 当前代码下 deit3_* 对 512 输入存在兼容前提，详见 README。
# =========================

experiment:
  run_name: "deit3_v1_seed42"
  seed: 42
  deterministic: true
  cudnn_benchmark: false

data:
  dataset_root: "data/processed/vit_dataset/v3_11block8"
  manifest_path: "data/processed/vit_dataset/v3_11block8/manifests/tiles_manifest_balanced_train.csv"
  image_dirname: "images"
  label_dirname: "labels"
  image_suffix: ".tif"
  label_suffix: ".tif"
  patch_size: 512
  in_channels: 3
  num_classes: 8
  ignore_index: 255
  validate_files_on_start: true
  augmentation:
    enabled: true
    hflip_prob: 0.5
    vflip_prob: 0.5
    rot90_prob: 0.5
    color_jitter_prob: 0.3
    brightness_delta: 0.1
    contrast_delta: 0.1
    channel_scale_prob: 0.2
    channel_scale_delta: 0.08
    gaussian_noise_prob: 0.2
    gaussian_noise_std: 0.02

loader:
  batch_size: 1
  eval_batch_size: 1
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  drop_last_train: false
  prefetch_factor: 2

model:
  architecture: "timm_seg"
  backbone: "deit3_base_patch16_224"
  pretrained: true
  dropout: 0.1
  decoder_head: "aspp_head"
  drop_path_rate: 0.1

train:
  max_epochs: 80
  amp: true
  grad_clip_norm: 1.0
  grad_accum_steps: 2
  log_every_n_steps: 20
  val_every_n_epochs: 1
  early_stopping_patience: 16
  early_stopping_min_delta: 0.0002

optimizer:
  lr: 6.0e-5
  weight_decay: 2.0e-2
  betas: [0.9, 0.999]
  eps: 1.0e-8
  backbone_lr_mult: 0.7
  decoder_lr_mult: 1.0

scheduler:
  warmup_epochs: 5
  power: 0.9
  min_lr: 5.0e-7

loss:
  type: "ce_dice"
  ignore_index: 255
  label_smoothing: 0.0
  ce_weight: 1.0
  dice_weight: 1.0
  class_weights: "auto_sqrt_inverse_freq"
  class_weights_floor: 0.2
  class_weights_cap: 5.0
  class_weights_renorm_after_clip: false

output:
  root_dir: "outputs/train_runs/formal"
  run_subdir: "deit3_v1_seed42"
  save_best_by: "val_miou"

evaluation:
  splits_to_eval: ["val", "test"]
  eco_holdout_missing_class_policy: "mark_na_and_average_present_classes"

freeze:
  verify_fingerprint_on_start: false
